version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_USER: playsms
      DB_PASS: playsms
      DB_NAME: playsms
  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: playsms
      MYSQL_USER: playsms
      MYSQL_PASSWORD: playsms
      MYSQL_ROOT_PASSWORD: playsms
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
